<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Security headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />
    <title>Repertório Música e Pinga - Repertórios e Packs de Músicas</title>
    <meta name="description" content="Repertórios e packs de músicas com streaming, downloads e muito mais." />

    <!-- PWA meta tags -->
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Música e Pinga" />
    <link rel="apple-touch-icon" href="/logo.jpeg" />
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Música e Pinga" />

    <!-- Preconnect to Supabase (used early for queries/auth) -->
    <link rel="preconnect" href="https://zsquzchwxnsuysfrlngt.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://sdk.mercadopago.com" />

    <!-- Hero image uses fetchpriority="high" on the <img> tag for LCP -->


    <!-- OG -->
    <meta property="og:title" content="Repertório Música e Pinga" />
    <meta property="og:image" content="/logo.jpeg" />
    <meta property="og:description" content="Plataforma de músicas com streaming, downloads e muito mais." />
    <meta property="og:type" content="website" />


    <meta name="twitter:card" content="summary_large_image" />

    <!-- Códigos de rastreamento dinâmicos via Super Admin (tracking_snippets)
         são injetados por src/components/pixels/TrackingSnippets.tsx.
         IMPORTANTE: scripts que precisam ser detectados por crawlers SEM JS
         (ex.: SuperPixel) devem ficar estáticos aqui no HTML. -->

    <!-- SuperPixel Tracking (precisa estar no HTML estático p/ o crawler detectar) -->
    <script src="https://superpixel-tracking.b-cdn.net/js/tracking.js?token=35cec3&platform=kiwify&funnel_id=4857"></script>


  </head>

  <body>
    <div id="root"></div>
    <script>
      // Auto-recuperação: se após 15s o app não montou, provavelmente o SW
      // antigo está servindo um index.html com referências a chunks que não
      // existem mais. Limpamos SW + caches e recarregamos uma única vez.
      (function () {
        var FLAG = "pwa-recovery-attempted";
        setTimeout(function () {
          var root = document.getElementById("root");
          if (root && root.children.length > 0) return;
          if (sessionStorage.getItem(FLAG)) return;
          sessionStorage.setItem(FLAG, "1");
          var done = function () { window.location.reload(); };
          var p = [];
          if ("serviceWorker" in navigator) {
            p.push(navigator.serviceWorker.getRegistrations().then(function (rs) {
              return Promise.all(rs.map(function (r) { return r.unregister(); }));
            }).catch(function () {}));
          }
          if ("caches" in window) {
            p.push(caches.keys().then(function (ks) {
              return Promise.all(ks.map(function (k) { return caches.delete(k); }));
            }).catch(function () {}));
          }
          Promise.all(p).then(done, done);
        }, 15000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
